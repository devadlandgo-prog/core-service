server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://localhost:5432/landgo
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${LIQUIBASE_DEFAULT_SCHEMA:core}
    liquibase-schema: ${LIQUIBASE_SCHEMA:core}
    database-change-log-table: ${LIQUIBASE_CHANGELOG_TABLE:databasechangelog_core}
    database-change-log-lock-table: ${LIQUIBASE_CHANGELOG_LOCK_TABLE:databasechangeloglock_core}
    drop-first: true

app:
  jwt:
    secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsForHS256Algorithm2024!}
  services:
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}
    payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
    databaseWrite:
      enabled: false

logging:
  level:
    root: INFO
    com.landgo: DEBUG
