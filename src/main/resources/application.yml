server:
  port: 8083

spring:
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://localhost:5432/landgo?currentSchema=core
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.json
    default-schema: core

app:
  jwt:
    secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsForHS256Algorithm2024!}
  services:
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}
    payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8082}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
